version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    build:
      context: ./infra/db
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: croppilot
      POSTGRES_PASSWORD: croppilot
      POSTGRES_DB: croppilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgis.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U croppilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    logging: *default-logging

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      POSTGRES_HOST: postgres
      OLLAMA_BASE_URL: "http://ollama:11434"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    logging: *default-logging

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: development
      POSTGRES_HOST: postgres
      OLLAMA_BASE_URL: "http://ollama:11434"
      CELERY_BROKER_URL: "sqla+postgresql://croppilot:croppilot@postgres:5432/croppilot"
      CELERY_RESULT_BACKEND: "db+postgresql://croppilot:croppilot@postgres:5432/croppilot"
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./backend:/app
    logging: *default-logging

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: development
      POSTGRES_HOST: postgres
      CELERY_BROKER_URL: "sqla+postgresql://croppilot:croppilot@postgres:5432/croppilot"
      CELERY_RESULT_BACKEND: "db+postgresql://croppilot:croppilot@postgres:5432/croppilot"
    command: celery -A workers.celery_app beat --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    logging: *default-logging

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.117.0
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
    volumes:
      - ./prometheus/otel-collector.yml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - prometheus
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v2.55.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: croppilot
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    logging: *default-logging

volumes:
  postgres_data:
  ollama_data:
  prometheus_data:
  grafana_data:
